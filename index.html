<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 사주 운세</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <p class="eyebrow" data-i18n="eyebrow">초보자도 바로 쓰는 웹 사주 프로그램</p>
        <h1 data-i18n="heroTitle">AI 사주 운세</h1>
        <p data-i18n="heroDescription">
          출생 정보만 입력하면 사주팔자, 오행, 대운, 오늘의 운세와
          재물·건강·직업운을 한국어로 쉽게 해석해 드립니다.
        </p>
      </div>
      <div class="language-switcher" aria-label="언어 선택" data-i18n-aria="languageLabel">
        <button class="language-switcher__button is-active" type="button" data-language="ko" aria-pressed="true" data-i18n="koButton">한국어</button>
        <button class="language-switcher__button" type="button" data-language="zh" aria-pressed="false" data-i18n="zhButton">中文</button>
      </div>
    </header>

    <main class="layout">
      <section class="card input-card" aria-labelledby="form-title">
        <h2 id="form-title" data-i18n="formTitle">출생 정보 입력</h2>
        <form id="saju-form">
          <div class="grid two">
            <label>
              <span data-i18n="yearLabel">출생연도</span>
              <input id="year" type="number" min="1900" max="2100" value="1990" required />
            </label>
            <label>
              <span data-i18n="monthLabel">출생월</span>
              <input id="month" type="number" min="1" max="12" value="1" required />
            </label>
            <label>
              <span data-i18n="dayLabel">출생일</span>
              <input id="day" type="number" min="1" max="31" value="1" required />
            </label>
            <label>
              <span data-i18n="hourLabel">출생시간</span>
              <select id="hour" required>
                <option value="0">자시 (23:00~00:59)</option>
                <option value="1">축시 (01:00~02:59)</option>
                <option value="3">인시 (03:00~04:59)</option>
                <option value="5">묘시 (05:00~06:59)</option>
                <option value="7">진시 (07:00~08:59)</option>
                <option value="9">사시 (09:00~10:59)</option>
                <option value="11">오시 (11:00~12:59)</option>
                <option value="13">미시 (13:00~14:59)</option>
                <option value="15">신시 (15:00~16:59)</option>
                <option value="17">유시 (17:00~18:59)</option>
                <option value="19">술시 (19:00~20:59)</option>
                <option value="21">해시 (21:00~22:59)</option>
              </select>
            </label>
          </div>

          <fieldset>
            <legend data-i18n="genderLegend">성별</legend>
            <label class="radio" id="male-label"><input type="radio" name="gender" value="male" checked /> 남성</label>
            <label class="radio" id="female-label"><input type="radio" name="gender" value="female" /> 여성</label>
          </fieldset>

          <button type="submit" data-i18n="submit">운세 보기</button>
        </form>
        <p class="notice" data-i18n="notice">※ 이 서비스는 전통 명리학 규칙을 바탕으로 한 재미용 해석입니다. 중요한 의사결정은 전문가와 상의하세요.</p>
      </section>

      <section class="results" id="results" aria-live="polite"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
